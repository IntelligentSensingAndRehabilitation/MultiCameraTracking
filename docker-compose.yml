services:
  mocap:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    image: isr/mct_acquisition
    tty: true
    stdin_open: true
    environment:
      REACT_APP_BASE_URL: ${REACT_APP_BASE_URL:-localhost}
      PYTHONUNBUFFERED: 1
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-network}
      NETWORK_INTERFACE: ${NETWORK_INTERFACE:-enp5s0}
      DHCP_LEASE_FILE: ${DHCP_LEASE_FILE:-/var/lib/dhcp/dhcpd.leases}
      DISK_SPACE_WARNING_THRESHOLD_GB: ${DISK_SPACE_WARNING_THRESHOLD_GB:-50}
      HEALTH_IDLE_POLL_S: ${HEALTH_IDLE_POLL_S:-30}
    volumes:
      - ${DATA_VOLUME:-/data}:/data
      - ${CAMERA_CONFIGS:-/camera_configs}:/configs
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/dhcp:/var/lib/dhcp:ro
      - ${DATAJOINT_EXTERNAL:-/mnt/datajoint_external}:/datajoint_external
    network_mode: host
    command: /Mocap/entrypoints/start_acquisition_gui.sh

  mocap-test:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    image: isr/mct_acquisition
    tty: true
    stdin_open: true
    environment:
      REACT_APP_BASE_URL: ${REACT_APP_BASE_URL:-localhost}
      REACT_APP_TEST_MODE: "true"
      PYTHONUNBUFFERED: 1
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-network}
      NETWORK_INTERFACE: ${NETWORK_INTERFACE:-enp5s0}
      DHCP_LEASE_FILE: ${DHCP_LEASE_FILE:-/var/lib/dhcp/dhcpd.leases}
      DISK_SPACE_WARNING_THRESHOLD_GB: ${DISK_SPACE_WARNING_THRESHOLD_GB:-50}
      HEALTH_IDLE_POLL_S: ${HEALTH_IDLE_POLL_S:-30}
    volumes:
      - ${TEST_DATA_VOLUME:-/data-test}:/data
      - ${CAMERA_CONFIGS:-/camera_configs}:/configs
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/dhcp:/var/lib/dhcp:ro
      - ${DATAJOINT_EXTERNAL:-/mnt/datajoint_external}:/datajoint_external
    network_mode: host
    command: /Mocap/entrypoints/start_acquisition_gui.sh

  test:
    image: isr/mct_acquisition
    command: /Mocap/entrypoints/run_tests.sh
    environment:
      PYTHONUNBUFFERED: 1
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-network}
      NETWORK_INTERFACE: ${NETWORK_INTERFACE:-enp5s0}
      DHCP_LEASE_FILE: ${DHCP_LEASE_FILE:-/var/lib/dhcp/dhcpd.leases}
      DISK_SPACE_WARNING_THRESHOLD_GB: ${DISK_SPACE_WARNING_THRESHOLD_GB:-50}
      HEALTH_IDLE_POLL_S: ${HEALTH_IDLE_POLL_S:-30}
    volumes:
      - ${DATA_VOLUME:-/data}:/data
      - ${CAMERA_CONFIGS:-/camera_configs}:/configs
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/dhcp:/var/lib/dhcp:ro
      - ${DATAJOINT_EXTERNAL:-/mnt/datajoint_external}:/datajoint_external
      - ./tests:/Mocap/tests
      - ./tests/testdata:/Mocap/tests/testdata
    network_mode: host

  reset:
    image: isr/mct_acquisition
    command: /Mocap/entrypoints/run_reset.sh
    volumes:
      - ${CAMERA_CONFIGS:-/camera_configs}:/configs
      - /etc/localtime:/etc/localtime:ro
    network_mode: host

  annotate:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.annotation
    image: isr/mct_annotation
    tty: true
    stdin_open: true
    environment:
      REACT_APP_BASE_URL: ${REACT_APP_BASE_URL:-localhost}
      PYTHONUNBUFFERED: 1
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DATAJOINT_EXTERNAL:-/mnt/datajoint_external}:/datajoint_external
    network_mode: host
